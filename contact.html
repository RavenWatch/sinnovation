<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato - SINNOVATION</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #f8fafc;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .login-input {
            width: 160px;
            height: 34px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 0 12px;
            color: white;
            outline: none;
            font-size: 13px;
        }

        .login-input::placeholder {
            color: rgba(255,255,255,0.35);
        }

        .contact-input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 14px 16px;
            outline: none;
            transition: 0.2s;
            background: white;
        }

        .contact-input:focus {
            border-color: #00E5FF;
            box-shadow: 0 0 0 4px rgba(0,229,255,0.15);
        }
    </style>
</head>

<body>

<!-- ══════════════════════════════════════════
     NAVBAR
════════════════════════════════════════════ -->
<nav class="navbar fixed top-0 left-0 right-0 z-50 px-6">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-14 gap-4">

        <!-- Nav links -->
        <div class="flex items-center gap-6">
            <span class="text-[13px] font-bold text-white/90 tracking-wide">
                SINNOVATION
            </span>

            <div class="hidden md:flex items-center gap-5 text-[13px] text-white/70">
                <a href="./index.html" class="hover:text-white transition-colors">
                    Home
                </a>

                <a href="./explorar.html" class="hover:text-white transition-colors">
                    Radar
                </a>

                <a href="./award.html" class="hover:text-white transition-colors">
                    Sinnovation award
                </a>

                <a href="./events.html" class="hover:text-white transition-colors">
                    Eventos
                </a>

                <a href="./aboutus.html" class="hover:text-white transition-colors">
                    Acerca de nós
                </a>

                <a href="./contact.html" class="text-[#00E5FF] font-semibold border-b border-[#00E5FF]/60 pb-px">
                    Contato
                </a>
            </div>
        </div>

        <!-- Login form -->
        <div class="hidden lg:flex items-center gap-3">
            <label class="flex flex-col gap-0.5">
                <span class="text-[10px] font-semibold tracking-[0.12em] uppercase text-white/40">
                    Email
                </span>

                <input class="login-input" placeholder="seu@email.com" type="email"/>
            </label>

            <label class="flex flex-col gap-0.5">
                <span class="text-[10px] font-semibold tracking-[0.12em] uppercase text-white/40">
                    Senha
                </span>

                <input class="login-input" placeholder="••••••••" type="password"/>
            </label>

            <div class="flex flex-col gap-1 mt-3">
                <label class="flex items-center gap-1 text-[11px] text-white/50 cursor-pointer select-none whitespace-nowrap">
                    <input type="checkbox" class="accent-[#00E5FF] w-3 h-3"/>
                    lembrar senha
                </label>

                <button class="text-[11px] text-[#00E5FF] hover:underline text-left whitespace-nowrap">
                    Criar nova conta
                </button>
            </div>
        </div>

    </div>
</nav>

<!-- ══════════════════════════════════════════
     CONTACT SECTION
════════════════════════════════════════════ -->
<section class="min-h-screen flex items-center justify-center px-6 pt-32 pb-16">

    <div class="w-full max-w-xl bg-white rounded-3xl shadow-xl border border-slate-200 p-10">

        <div class="mb-8 text-center">
            <h1 class="text-4xl font-black text-slate-800 mb-3">
                Entre em contato
            </h1>

            <p class="text-slate-500 text-sm leading-relaxed">
                Envie sua mensagem para nossa equipe. 
                Retornaremos o mais rápido possível.
            </p>
        </div>

        <form class="flex flex-col gap-5">

            <!-- Nome -->
            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-slate-700">
                    Nome
                </label>

                <input 
                    type="text"
                    placeholder="Digite seu nome"
                    class="contact-input"
                />
            </div>

            <!-- Email -->
            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-slate-700">
                    Email
                </label>

                <input 
                    type="email"
                    placeholder="Digite seu email"
                    class="contact-input"
                />
            </div>

            <!-- Assunto -->
            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-slate-700">
                    Assunto
                </label>

                <textarea 
                    placeholder="Digite o assunto da mensagem"
                    rows="5"
                    class="contact-input resize-none"
                ></textarea>
            </div>

            <!-- Botão -->
            <button 
                type="submit"
                class="mt-3 h-14 rounded-2xl bg-cyan-500 hover:bg-cyan-400
                       transition-all duration-300 text-white font-bold text-sm
                       shadow-lg hover:scale-[1.01]">
                Enviar mensagem
            </button>

        </form>

    </div>

</section>

</body>
</html>
